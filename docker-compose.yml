version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: wb_analytics_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wbanaliz
      MYSQL_USER: wbuser
      MYSQL_PASSWORD: wbpass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  app:
    build: .
    container_name: wb_analytics_app
    depends_on:
      - db
    environment:
      - DATABASE_URL=mysql+mysqlconnector://wbuser:wbpass@db:3306/wbanaliz
      - SECRET_KEY=your_secret_key_here
      - TELEGRAM_BOT_TOKEN=your_telegram_bot_token
      - TELEGRAM_BOT_NAME=your_bot_name
      - TELEGRAM_URL=your_domain_or_ngrok_url
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  db_data: